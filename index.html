<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Cumpleaños Paloma ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(180deg,#0f172a,#4a154b);
font-family:Arial,Helvetica,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

}


.card{

width:90%;
max-width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.4);

}


h1{

margin-bottom:20px;
color:#ffd166;

}


p{

font-size:18px;
line-height:1.6;

}


button{

margin-top:25px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#e91e63;
color:white;
font-size:17px;
cursor:pointer;

}


button:hover{

background:#c2185b;

}


.small{

background:#777;

}


.small:hover{

background:#555;

}


.heart{

position:fixed;
font-size:22px;
animation:fall 8s linear infinite;

}


@keyframes fall{

0%{
transform:translateY(-100px);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</head>


<body>


<div class="card" id="card"></div>


<script>


const paginas=[


{
titulo:"✨ Hola Paloma ✨",
texto:"Tengo una pequeña invitación para ti."
},


{
titulo:"🎂 ¡Quiero Celebrar tú Cumpleaños! 🎂",
texto:"Hoy deseo que este nuevo año de vida esté lleno de felicidad, salud, sonrisas y muchos momentos inolvidables."
},


{
titulo:"❤️",
texto:"Hay regalos que pueden envolverse... pero hay otros que simplemente se viven."
},


{
titulo:"🌹",
texto:"Y precisamente hoy quisiera regalarte uno de esos momentos."
},


{
titulo:"🍷 Invitación",
texto:"¿Aceptarías acompañarme a cenar esta noche para celebrar tu cumpleaños?"
}


];


let paso=0;



function mostrar(){


let html="";


if(paso<paginas.length){


html=`

<h1>${paginas[paso].titulo}</h1>

<p>${paginas[paso].texto}</p>


<button onclick="siguiente()">
Continuar ❤️
</button>

`;


}else{


html=`

<h1>❤️ ¿Aceptas?</h1>


<p>
Me haría muy feliz compartir esta noche contigo.
</p>


<button onclick="acepto()">
❤️ Sí, acepto
</button>


<br>


<button class="small" onclick="nopuedo()">
🤍 No puedo
</button>

`;

}


document.getElementById("card").innerHTML=html;


}




function siguiente(){

paso++;

mostrar();

}




function acepto(){


// URL de Google Apps Script

const url = "https://script.google.com/macros/s/AKfycbxi8Gg0b5-kyihvPvlyxTqjZgEtbEE64nYl3lWhTl-QPywsg4gkCSXDdKkQ04HnN29lqw/exec";



// Enviar respuesta a Google Sheets

fetch(url,{

method:"POST",

mode:"no-cors",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

persona:"Paloma",

respuesta:"Aceptó la invitación ❤️",

fecha:new Date().toLocaleString()

})

});




// Mostrar mensaje final


document.getElementById("card").innerHTML=`


<h1>💖 ¡Gracias, Paloma!</h1>


<p>

Me hace muy feliz que hayas aceptado.

</p>


<br>


<h2>

🌹 Hoy pasaré por ti

<br><br>

🕖 7:00 PM

</h2>


<br>


<p>

Prepárate para una noche muy especial.

</p>


<br>


<b>

Con cariño,

<br>

Mauricio ❤️

</b>


`;

}




function nopuedo(){


document.getElementById("card").innerHTML=`


<h1>🌷</h1>


<p>

Lo entiendo.

<br><br>

Solo quería desearte un muy feliz cumpleaños.

<br><br>

Espero que tengas un día maravilloso.

</p>


<br>


<b>

Mauricio ❤️

</b>


`;

}




mostrar();




// Corazones cayendo

setInterval(function(){


let h=document.createElement("div");


h.className="heart";


h.innerHTML=Math.random()>0.5?"❤️":"🌹";


h.style.left=Math.random()*100+"vw";


h.style.animationDuration=(5+Math.random()*4)+"s";


document.body.appendChild(h);



setTimeout(function(){

h.remove();

},8000);



},600);


</script>


</body>

</html>
