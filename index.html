<script>

const urlGoogle =
"https://script.google.com/macros/s/AKfycbxi8Gg0b5-kyihvPvlyxTqjZgEtbEE64nYl3lWhTl-QPywsg4gkCSXDdKkQ04HnN29lqw/exec";



const paginas=[

{
titulo:"✨ Hola Paloma ✨",
texto:"Tengo una pequeña invitacion para ti."
},


{
titulo:"🎂 ¡Quiero Celebrar tú Cumpleaños! 🎂",
texto:"Hoy deseo que este nuevo año de vida esté lleno de felicidad, salud, sonrisas y muchos momentos inolvidables."
},


{
titulo:"❤️",
texto:"Hay regalos que pueden envolverse... pero hay otros que simplemente se viven."
},


{
titulo:"🌹",
texto:"Y precisamente hoy quisiera regalarte uno de esos momentos."
},


{
titulo:"🍷 Invitación",
texto:"¿Aceptarías acompañarme a cenar esta noche para celebrar tu cumpleaños?"
}

];


let paso=0;



function mostrar(){

let html="";


if(paso < paginas.length){


html=`

<h1>${paginas[paso].titulo}</h1>

<p>${paginas[paso].texto}</p>

<button onclick="siguiente()">
Continuar ❤️
</button>

`;



}else{


html=`

<h1>❤️ ¿Aceptas?</h1>


<p>
Me haría muy feliz compartir esta noche contigo.
</p>


<button onclick="acepto()">
❤️ Sí, acepto
</button>


<br>


<button class="small" onclick="nopuedo()">
🤍 No puedo
</button>

`;

}


document.getElementById("card").innerHTML=html;


}




function siguiente(){

paso++;

mostrar();

}




// ==============================
// RESPUESTA ACEPTADA
// ==============================

function acepto(){


enviarRespuesta(
"Paloma",
"Aceptó la invitación ❤️"
);



document.getElementById("card").innerHTML=`


<h1>💖 ¡Gracias, Paloma!</h1>


<p>
Me hace muy feliz que hayas aceptado.
</p>


<br>


<h2>

🌹 Hoy pasaré por ti

<br><br>

🕖 7:00 PM

</h2>


<br>


<p>
Prepárate para una noche muy especial.
</p>


<br>


<b>
Con cariño,
<br>
Mauricio ❤️
</b>


`;

}





// ==============================
// RESPUESTA NO PUEDE
// ==============================

function nopuedo(){


enviarRespuesta(
"Paloma",
"No pudo asistir a la invitación 🤍"
);



document.getElementById("card").innerHTML=`


<h1>🌷</h1>


<p>

Lo entiendo.

<br><br>

Solo quería desearte un muy feliz cumpleaños.

<br><br>

Espero que tengas un día maravilloso.

</p>


<br>


<b>

Mauricio ❤️

</b>


`;

}




// ==============================
// ENVÍO A GOOGLE APPS SCRIPT
// ==============================

function enviarRespuesta(persona,respuesta){


fetch(urlGoogle, {


method:"POST",


mode:"no-cors",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


persona:persona,


respuesta:respuesta,


fecha:new Date().toLocaleString()


})


});


}




mostrar();




// ==============================
// LLUVIA DE CORAZONES
// ==============================


setInterval(function(){


let h=document.createElement("div");


h.className="heart";


h.innerHTML=Math.random()>0.5?"❤️":"🌹";


h.style.left=Math.random()*100+"vw";


h.style.animationDuration=(5+Math.random()*4)+"s";


document.body.appendChild(h);



setTimeout(function(){

h.remove();

},8000);



},600);


</script>
